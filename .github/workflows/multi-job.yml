name: multi-job
on:
  push:
    branches: [main]

jobs:
  builds:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Building the app"

  tests:
    runs-on: ubuntu-latest
    needs: builds
    steps:
      - run: echo "Running tests"

  deploy:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - run: echo "Deploying"
