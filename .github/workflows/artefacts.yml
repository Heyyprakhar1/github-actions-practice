name: artifact-demo

on:
  workflow_dispatch:

jobs:
  artifact-job:
    runs-on: ubuntu-latest

    steps:
      - name: Generate test report
        run: |
          echo "Test Execution Report" > report.txt
          echo "All tests passed!" >> report.txt

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.txt
