name: PR Check

on:
    pull_request:
        branches:
            - main # Only fires when the PR target is `main`
        types:
            - opened # PR just created
            - synchronize # New commit pushed to the PR branch

jobs:
    pr-check:
        name: Run PR Checks
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Print branch name
              run: |
                  echo "PR check running for branch: ${{ github.head_ref }}"
