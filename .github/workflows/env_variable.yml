name: env-demo

on:
    workflow_dispatch:

env:
    APP_NAME: myapp

jobs:
    demo-job:
        runs-on: ubuntu-latest

        env:
            ENVIRONMENT: staging

        steps:
            - name: Print variables
              env:
                  VERSION: 1.0.0
              run: |
                  echo "App: $APP_NAME"
                  echo "Environment: $ENVIRONMENT"
                  echo "Version: $VERSION"
                  echo "Commit SHA: ${{ github.sha }}"
                  echo "Actor: ${{ github.actor }}"
