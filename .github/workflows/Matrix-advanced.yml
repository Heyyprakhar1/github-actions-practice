name: Matrix-Advanced
on:
  push:
    branches: [main]

jobs:
  Matrix-advanced:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        python-version: ["3.11", "3.12", "3.13"]
        exclude:
            - os: windows-latest
              python-version: "3.10"
    steps:
      - name: Setup-Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: prints Python version
        run: python --version
