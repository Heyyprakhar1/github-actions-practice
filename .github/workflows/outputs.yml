name: job-output-demo

on:
    workflow_dispatch:

jobs:
    generate-date:
        runs-on: ubuntu-latest

        outputs:
            today: ${{ steps.date-step.outputs.today }}

        steps:
            - name: Get today's date
              id: date-step
              run: |
                  echo "today=$(date)" >> $GITHUB_OUTPUT

    print-date:
        runs-on: ubuntu-latest
        needs: generate-date

        steps:
            - name: Print date from previous job
              run: |
                  echo "Today's date is: ${{ needs.generate-date.outputs.today }}"
